<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Auto-Poster | Neon Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
            font-family: 'Courier New', monospace;
            color: #00ffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #ff00ff;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 10px #ff00ff;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #ff00ff; }
            50% { text-shadow: 0 0 20px #00ffff; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff00ff;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .card h2 {
            color: #ff00ff;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 1px solid #00ffff;
            color: #00ffff;
            font-family: monospace;
            border-radius: 5px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }
        
        button {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: #000;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 1em;
            margin: 5px;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #00ff00, #00aa00);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #ff0000, #aa0000);
        }
        
        .logs-container {
            background: #000;
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 5px;
            margin: 5px 0;
            border-left: 3px solid;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .log-info { border-left-color: #00ffff; color: #00ffff; }
        .log-success { border-left-color: #00ff00; color: #00ff00; }
        .log-error { border-left-color: #ff0000; color: #ff0000; }
        .log-warning { border-left-color: #ffff00; color: #ffff00; }
        
        .status-bar {
            background: #000;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
        
        .stats {
            display: inline-block;
            margin: 0 20px;
        }
        
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff00ff;
            border-radius: 5px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 FACEBOOK AUTO-POSTER TOOL</h1>
            <p>Neon Edition | High-Tech Automation</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📱 CONFIGURATION</h2>
                <textarea id="cookies" rows="3" placeholder="Facebook Cookies&#10;Example: c_user=123456; xs=789012;"></textarea>
                <input type="text" id="group_uid" placeholder="Group UID (e.g., 123456789012345)">
                <input type="number" id="delay" placeholder="Delay between posts (seconds)" value="5" min="1">
            </div>
            
            <div class="card">
                <h2>📝 MESSAGES</h2>
                <textarea id="messages" rows="8" placeholder="Enter one message per line...&#10;&#10;Hello everyone!&#10;Welcome to our group!&#10;Check out this post!"></textarea>
            </div>
        </div>
        
        <div class="card">
            <h2>🎮 CONTROL PANEL</h2>
            <div style="text-align: center;">
                <button class="btn-start" onclick="startPosting()">▶ START POSTING</button>
                <button class="btn-stop" onclick="stopPosting()">⏹ STOP POSTING</button>
                <button onclick="clearLogs()">🗑 CLEAR LOGS</button>
            </div>
        </div>
        
        <div class="card">
            <h2>💻 LIVE LOGS</h2>
            <div class="logs-container" id="logs">
                <div class="log-entry log-info">[System] Ready to start posting...</div>
            </div>
        </div>
        
        <div class="status-bar" id="status">
            <span class="stats">✅ STATUS: READY</span>
            <span class="stats" id="stats">📊 Total Posts: 0</span>
        </div>
    </div>
    
    <script>
        let updateInterval;
        
        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        async function startPosting() {
            const cookies = document.getElementById('cookies').value;
            const group_uid = document.getElementById('group_uid').value;
            const delay = document.getElementById('delay').value;
            const messages = document.getElementById('messages').value;
            
            if (!cookies) {
                addLog('Please enter Facebook cookies!', 'error');
                return;
            }
            if (!group_uid) {
                addLog('Please enter Group UID!', 'error');
                return;
            }
            if (!messages) {
                addLog('Please enter messages to post!', 'error');
                return;
            }
            
            addLog('Starting posting process...', 'info');
            
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cookies, group_uid, delay, messages})
                });
                
                const data = await response.json();
                if (response.ok) {
                    addLog(`Started posting ${data.total} messages`, 'success');
                    startLogPolling();
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }
        
        async function stopPosting() {
            addLog('Stopping posting process...', 'warning');
            try {
                await fetch('/api/stop', {method: 'POST'});
                addLog('Posting stopped by user', 'warning');
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }
        
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                
                if (logs.length > 0) {
                    const logsDiv = document.getElementById('logs');
                    logsDiv.innerHTML = '';
                    logs.forEach(log => {
                        const logEntry = document.createElement('div');
                        logEntry.className = `log-entry log-${log.type}`;
                        logEntry.innerHTML = `[${log.timestamp}] ${log.message}`;
                        logsDiv.appendChild(logEntry);
                    });
                    logsDiv.scrollTop = logsDiv.scrollHeight;
                }
                
                const statusResponse = await fetch('/api/status');
                const status = await statusResponse.json();
                
                const statusDiv = document.getElementById('status');
                if (status.is_posting) {
                    statusDiv.innerHTML = '<span class="stats">🚀 STATUS: POSTING ACTIVE</span><span class="stats" id="stats">📊 Posting in progress...</span>';
                } else {
                    statusDiv.innerHTML = '<span class="stats">✅ STATUS: READY</span><span class="stats" id="stats">📊 Total Posts: 0</span>';
                }
            } catch (error) {
                console.error('Error fetching logs:', error);
            }
        }
        
        function startLogPolling() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(fetchLogs, 2000);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '<div class="log-entry log-info">[System] Logs cleared</div>';
            addLog('Logs cleared by user', 'info');
        }
        
        // Start polling
        startLogPolling();
        
        // Auto-refresh status
        setInterval(fetchLogs, 3000);
    </script>
</body>
  </html>
